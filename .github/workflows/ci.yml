name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest python/tests/ -v --tb=short --ignore=python/tests/test_e2e_playwright.py

      - name: Verify test count matches documentation
        run: |
          COUNT=$(python -m pytest python/tests/ --collect-only -q --ignore=python/tests/test_e2e_playwright.py 2>/dev/null | tail -1 | grep -oP '^\d+')
          echo "Tests collected: $COUNT"
          if [ "$COUNT" -lt 321 ]; then
            echo "ERROR: Expected at least 321 tests, got $COUNT"
            exit 1
          fi
