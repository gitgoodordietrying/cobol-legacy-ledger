name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Lint Python
        run: ruff check python/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: >
          python -m pytest python/tests/ -v --tb=short
          --ignore=python/tests/test_e2e_playwright.py
          --ignore=python/tests/test_conversation.py
          --ignore=python/tests/test_llm_providers.py
          --ignore=python/tests/test_simulation_comprehensive.py
          -p no:asyncio

      - name: Verify test count matches documentation
        run: |
          COUNT=$(python -m pytest python/tests/ --collect-only -q --ignore=python/tests/test_e2e_playwright.py 2>/dev/null | tail -1 | grep -oP '^\d+')
          echo "Tests collected: $COUNT"
          if [ "$COUNT" -lt 730 ]; then
            echo "ERROR: Expected at least 730 tests, got $COUNT"
            exit 1
          fi
